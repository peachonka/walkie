name: frontend
description: "A new Flutter project."
publish_to: 'none' # Remove this line if you wish to publish to pub.dev

version: 1.0.0+1

environment:
  sdk: ^3.9.2

dependencies:
  flutter:
    sdk: flutter
  supabase_flutter: ^2.0.0
  shared_preferences: ^2.2.2
  flutter_dotenv: ^5.1.0
  http: ^1.1.0

  cupertino_icons: ^1.0.8
  # go_router: ^14.2.0
  lucide_icons: 0.257.0
  flutter_svg: ^2.2.4
  lucide_icons_svg: ^0.0.4

  flutter_map: ^8.2.2
  latlong2: ^0.9.0
  geolocator: ^12.0.0  # Для работы с геолокацией
  permission_handler: ^11.3.0  # Для запроса разрешений

dev_dependencies:
  flutter_test:
    sdk: flutter

  flutter_lints: ^5.0.0

flutter:
  uses-material-design: true
  assets:
    - .env
    - assets/images/
    - assets/fonts/
    - assets/images/items/
    - assets/icons/

  fonts:
    - family: Sigmar Cyrillic
      fonts:
        - asset: assets/fonts/sigmarcyrillic.otf

    - family: Pangolin
      fonts:
        - asset: assets/fonts/Pangolin-Regular.ttf